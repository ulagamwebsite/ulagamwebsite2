<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLOCKCHAIN TECHNOLOGY</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #030712;
  color: #f3f4f6;
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* CYBER GRID & DIGITAL ASSETS BACKGROUND SYSTEM */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 25%, rgba(59, 130, 246, 0.18) 0%, transparent 50%),
    radial-gradient(circle at 80% 75%, rgba(168, 85, 247, 0.18) 0%, transparent 50%),
    url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2038bdf8' fill-opacity='0.04'%3E%3Cpath d='M50 50h-8v8h8v-8zm0-40h-8v8h8v-8zm-30 0h-8v8h8v-8zm0 40h-8v8h8v-8zm15-20h-8v8h8v-8zm0 20h-8v8h8v-8zm0-40h-8v8h8v-8z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),
    linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
  background-size: 100% 100%, 100% 100%, 80px 80px, 35px 35px, 35px 35px;
  z-index: -1;
}

/* HERO SECTION */
.hero {
  max-width: 1200px;
  margin: 0 auto;
  padding: 70px 20px 30px;
  text-align: center;
}

.floating-heading {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 900;
  background: linear-gradient(135deg, #60a5fa 0%, #c084fc 50%, #f472b6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-transform: uppercase;
  letter-spacing: 4px;
  animation: glowPulse 3.5s ease-in-out infinite alternate;
}

@keyframes glowPulse {
  0% { filter: drop-shadow(0 0 12px rgba(96, 165, 250, 0.35)); transform: translateY(0); }
  100% { filter: drop-shadow(0 0 28px rgba(192, 132, 252, 0.65)); transform: translateY(-8px); }
}

.sub-heading {
  font-size: 16px;
  color: #9ca3af;
  margin-top: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 600;
}

/* POSTER GRID */
.poster-grid {
  max-width: 1200px;
  margin: 40px auto 80px;
  padding: 0 35px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 380px));
  gap: 60px;
  justify-content: center;
}

/* POSTER CARD SYSTEM WITH WINGS */
.poster-card {
  background: rgba(17, 24, 39, 0.88);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 24px;
  padding: 22px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
}

/* LEFT WING */
.poster-card::before {
  content: '';
  position: absolute;
  top: 10%;
  left: -48px;
  width: 65px;
  height: 80%;
  background: linear-gradient(135deg, rgba(96, 165, 250, 0.35) 0%, rgba(168, 85, 247, 0.05) 85%);
  border-left: 2px dashed rgba(96, 165, 250, 0.6);
  border-radius: 120px 0 0 140px;
  transform-origin: right center;
  transform: rotate(-8deg);
  z-index: -1;
  transition: all 0.5s ease;
  filter: drop-shadow(-5px 0 10px rgba(96, 165, 250, 0.3));
}

/* RIGHT WING */
.poster-card::after {
  content: '';
  position: absolute;
  top: 10%;
  right: -48px;
  width: 65px;
  height: 80%;
  background: linear-gradient(-135deg, rgba(168, 85, 247, 0.35) 0%, rgba(244, 114, 182, 0.05) 85%);
  border-right: 2px dashed rgba(168, 85, 247, 0.6);
  border-radius: 0 120px 140px 0;
  transform-origin: left center;
  transform: rotate(8deg);
  z-index: -1;
  transition: all 0.5s ease;
  filter: drop-shadow(5px 0 10px rgba(168, 85, 247, 0.3));
}

/* HOVER FLAPPING EFFECT */
.poster-card:hover {
  transform: translateY(-10px) scale(1.01);
  border-color: rgba(96, 165, 250, 0.6);
  box-shadow: 0 30px 60px rgba(59, 130, 246, 0.3);
}

.poster-card:hover::before {
  left: -70px;
  width: 90px;
  transform: rotate(-14deg);
  background: linear-gradient(135deg, rgba(96, 165, 250, 0.5) 0%, rgba(168, 85, 247, 0.1) 90%);
  filter: drop-shadow(-8px 0 18px rgba(96, 165, 250, 0.6));
}

.poster-card:hover::after {
  right: -70px;
  width: 90px;
  transform: rotate(14deg);
  background: linear-gradient(-135deg, rgba(168, 85, 247, 0.5) 0%, rgba(244, 114, 182, 0.1) 90%);
  filter: drop-shadow(8px 0 18px rgba(168, 85, 247, 0.6));
}

/* IMAGE FRAME */
.image-container {
  width: 100%;
  height: 430px;
  border-radius: 16px;
  overflow: hidden;
  background: #000;
  position: relative;
  border: 1px solid rgba(255, 255, 255, 0.08);
}

.poster-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  transition: transform 0.5s ease;
}

.poster-card:hover .poster-image {
  transform: scale(1.05);
}

/* ACTION BUTTON */
.poster-btn {
  font-family: 'Orbitron', sans-serif;
  width: 100%;
  padding: 16px;
  margin-top: 22px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
  color: #ffffff;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
}

.poster-btn:hover {
  background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
}

/* MODAL POPUP */
.registration-popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(3, 7, 18, 0.88);
  backdrop-filter: blur(12px);
  z-index: 9999;
  padding: 20px;
}

.registration-box {
  width: 100%;
  max-width: 440px;
  padding: 40px 32px;
  background: #0f172a;
  border: 1px solid rgba(96, 165, 250, 0.3);
  border-radius: 24px;
  text-align: center;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.75);
  animation: modalSlide 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes modalSlide {
  from { opacity: 0; transform: scale(0.9) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.registration-box h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 16px;
  color: #60a5fa;
  letter-spacing: 1.5px;
}

.registration-box p {
  font-size: 16px;
  line-height: 1.6;
  color: #cbd5e1;
  margin-bottom: 28px;
}

.registration-box.closed-box {
  border-color: rgba(239, 68, 68, 0.4);
}

.registration-box.closed-box h2 {
  color: #f87171;
}

.registration-box button {
  font-family: 'Orbitron', sans-serif;
  width: 100%;
  padding: 14px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  background: rgba(255, 255, 255, 0.05);
  color: #ffffff;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.registration-box button:hover {
  background: #ffffff;
  color: #0f172a;
}
</style>
</head>
<body>

<div id="mainPage">
  <section class="hero">
    <h1 class="floating-heading">Blockchain Technology</h1>
    <p class="sub-heading">Official Event Registration Portal</p>
  </section>

  <section class="poster-grid">
    <!-- EVENT CARD 1 -->
    <div class="poster-card">
      <div class="image-container">
        <img src="https://i.postimg.cc/VNX5rc4c/Chat-GPT-Image-Jul-20-2026-01-14-00-PM.png" alt="Blockchain Event 1" class="poster-image">
      </div>
      <button class="poster-btn" onclick="openGoogleForm()">REGISTER NOW</button>
    </div>

    <!-- EVENT CARD 2 -->
    <div class="poster-card">
      <div class="image-container">
        <img src="https://i.postimg.cc/wMKKVVJw/signal-2026-07-04-11-05-19-091.jpg" alt="Blockchain Event 2" class="poster-image">
      </div>
      <button class="poster-btn" onclick="openNewRegistration()">REGISTER NOW</button>
    </div>
  </section>
</div>

<!-- MODAL POPUP -->
<div id="registrationPopup" class="registration-popup">
  <div id="popupBox" class="registration-box">
    <h2 id="popupTitle">REGISTRATION STATUS</h2>
    <p id="popupMessage">MESSAGE</p>
    <button onclick="closeRegistrationPopup()">CLOSE WINDOW</button>
  </div>
</div>

<script>
// FIRST BUTTON LOGIC (TIMED: OPEN 21.07.2026 07:00 PM | CLOSE 22.07.2026 07:00 PM)
function openGoogleForm() { 
  let now = new Date();
  let openDate = new Date("2026-07-21T19:00:00"); 
  let closeDate = new Date("2026-07-22T19:00:00"); 

  if (now < openDate) {
    showRegistrationPopup("REGISTRATION STATUS", "Registration opens on <br><br><strong style='color:#60a5fa; font-size:18px;'>July 21, 2026 at 07:00 PM</strong>", false);
  } else if (now >= openDate && now < closeDate) {
    window.open("https://forms.gle/MJ5tGyeGCARZ6Mgc9", "_blank"); 
  } else {
    showRegistrationPopup("REGISTRATION CLOSED", "Sorry! The form is officially closed.<br><br><span style='color:#f87171;'>Deadline expired on July 22, 2026 at 07:00 PM</span>", true);
  }
}

// SECOND BUTTON LOGIC (TIMED: OPEN 03.07.2026 11:00 AM | CLOSE 05.07.2026 04:00 PM)
function openNewRegistration() { 
  let now = new Date();
  let openDate = new Date("2026-07-03T11:00:00"); 
  let closeDate = new Date("2026-07-05T16:00:00"); 

  if (now < openDate) { 
    showRegistrationPopup("REGISTRATION STATUS", "Registration opens on <br><br><strong style='color:#60a5fa; font-size:18px;'>July 03, 2026 at 11:00 AM</strong>", false); 
  } else if (now >= openDate && now < closeDate) { 
    window.open("https://forms.gle/J96zU1C3zDXf6D6d6", "_blank"); 
  } else {
    showRegistrationPopup("REGISTRATION CLOSED", "Sorry! The form is officially closed.<br><br><span style='color:#f87171;'>Deadline expired on July 05, 2026</span>", true);
  }
}

// ADVANCED POPUP CONTROLLER
function showRegistrationPopup(title, message, isClosed) { 
  let popup = document.getElementById("registrationPopup");
  let box = document.getElementById("popupBox");
  
  document.getElementById("popupTitle").innerText = title;
  document.getElementById("popupMessage").innerHTML = message; 
  
  if(isClosed) {
    box.classList.add("closed-box");
  } else {
    box.classList.remove("closed-box");
  }
  
  popup.style.display = "flex"; 
}

function closeRegistrationPopup() { 
  document.getElementById("registrationPopup").style.display = "none"; 
}

window.onclick = function(event) {
  if (event.target == document.getElementById("registrationPopup")) { 
    document.getElementById("registrationPopup").style.display = "none"; 
  }
}
</script>
</body>
</html>
